<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abel Zeleke - Professional Presence</title>
    <style>
        /* --- COLORS AND FONTS --- */
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-accent: #8b7355; /* The "Gold" color */
            --text-body: #d1d1d1;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-body);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            border-left: 2px solid var(--text-accent);
            padding-left: 30px;
            max-width: 600px;
        }

        h1 {
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0 0 10px 0;
        }

        .tagline {
            color: var(--text-accent);
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        h3 {
            color: var(--text-accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 25px;
            margin-bottom: 12px;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin-bottom: 8px;
            color: var(--text-body);
        }

        .languages {
            color: var(--text-body);
        }

        .location {
            color: var(--text-body);
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Abel Zeleke</h1>
        <p class="tagline">Strategic. Silent. Efficient.</p>

        <h3>Core Skills</h3>
        <ul>
            <li>• Web Developer</li>
            <li>• Video Editor & Creator</li>
            <li>• Digital Content Production</li>
        </ul>

        <h3>Languages</h3>
        <p class="languages">Arabic | English</p>

        <h3>Based In</h3>
        <p class="location">Bahir Dar, Ethiopia</p>
    </div>

</body>
</html>
