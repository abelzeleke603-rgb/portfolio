<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            width: 300px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
        }

        .search-box button {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: #ff6b6b;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #ff5252;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .city-name {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: 1.2em;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .temperature {
            font-size: 3.5em;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .detail {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
        }

        .detail-label {
            font-size: 0.9em;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .loading {
            color: white;
            text-align: center;
            font-size: 1.2em;
        }

        .hidden {
            display: none;
        }

        .forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .forecast-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .forecast-day {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 2em;
            margin: 10px 0;
        }

        .forecast-temp {
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .search-box {
                flex-direction: column;
            }

            .search-box input {
                width: 100%;
            }

            .temperature {
                font-size: 2.5em;
            }

            .weather-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any city</p>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="searchWeather()">Search</button>
        </div>

        <div id="errorMessage" class="error hidden"></div>
        <div id="loadingMessage" class="loading hidden">Loading...</div>
        
        <div id="weatherContainer" class="hidden">
            <div class="weather-card">
                <div class="city-name" id="cityName"></div>
                <div class="weather-description" id="weatherDesc"></div>
                <div class="temperature" id="temperature"></div>

                <div class="weather-details">
                    <div class="detail">
                        <div class="detail-label">Feels Like</div>
                        <div class="detail-value" id="feelsLike"></div>
                    </div>
                    <div class="detail">
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value" id="humidity"></div>
                    </div>
                    <div class="detail">
                        <div class="detail-label">Wind Speed</div>
                        <div class="detail-value" id="windSpeed"></div>
                    </div>
                    <div class="detail">
                        <div class="detail-label">Pressure</div>
                        <div class="detail-value" id="pressure"></div>
                    </div>
                    <div class="detail">
                        <div class="detail-label">Visibility</div>
                        <div class="detail-value" id="visibility"></div>
                    </div>
                    <div class="detail">
                        <div class="detail-label">UV Index</div>
                        <div class="detail-value" id="uvIndex"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '5d7e7b8e7e7e7e7e7e7e7e7e7e7e7e7e'; // Using Open-Meteo (free, no key needed)

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            
            if (!city) {
                showError('Please enter a city name');
                return;
            }

            showLoading(true);
            hideError();

            try {
                // Get coordinates from city name
                const geoResponse = await fetch(
                    `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`
                );
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    showError('City not found. Please try another name.');
                    showLoading(false);
                    return;
                }

                const { latitude, longitude, name, country } = geoData.results[0];

                // Get weather data
                const weatherResponse = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,pressure_msl,visibility&timezone=auto`
                );
                const weatherData = await weatherResponse.json();

                displayWeather(weatherData, name, country);
                showLoading(false);
            } catch (error) {
                showError('Error fetching weather data. Please try again.');
                console.error('Error:', error);
                showLoading(false);
            }
        }

        function displayWeather(data, cityName, country) {
            const current = data.current;
            const weatherCode = current.weather_code;

            // Map WMO weather codes to descriptions and emojis
            const weatherMap = {
                0: { desc: 'Clear sky', emoji: '☀️' },
                1: { desc: 'Mainly clear', emoji: '🌤️' },
                2: { desc: 'Partly cloudy', emoji: '⛅' },
                3: { desc: 'Overcast', emoji: '☁️' },
                45: { desc: 'Foggy', emoji: '🌫️' },
                48: { desc: 'Depositing rime fog', emoji: '🌫️' },
                51: { desc: 'Light drizzle', emoji: '🌧️' },
                53: { desc: 'Moderate drizzle', emoji: '🌧️' },
                55: { desc: 'Dense drizzle', emoji: '🌧️' },
                61: { desc: 'Slight rain', emoji: '🌧️' },
                63: { desc: 'Moderate rain', emoji: '🌧️' },
                65: { desc: 'Heavy rain', emoji: '⛈️' },
                71: { desc: 'Slight snow', emoji: '❄️' },
                73: { desc: 'Moderate snow', emoji: '❄️' },
                75: { desc: 'Heavy snow', emoji: '❄️' },
                77: { desc: 'Snow grains', emoji: '❄️' },
                80: { desc: 'Slight rain showers', emoji: '🌧️' },
                81: { desc: 'Moderate rain showers', emoji: '🌧️' },
                82: { desc: 'Violent rain showers', emoji: '⛈️' },
                85: { desc: 'Slight snow showers', emoji: '❄️' },
                86: { desc: 'Heavy snow showers', emoji: '❄️' },
                95: { desc: 'Thunderstorm', emoji: '⛈️' },
                96: { desc: 'Thunderstorm with hail', emoji: '⛈️' },
                99: { desc: 'Thunderstorm with hail', emoji: '⛈️' }
            };

            const weather = weatherMap[weatherCode] || { desc: 'Unknown', emoji: '🌍' };

            document.getElementById('cityName').textContent = `${weather.emoji} ${cityName}, ${country}`;
            document.getElementById('weatherDesc').textContent = weather.desc;
            document.getElementById('temperature').textContent = `${Math.round(current.temperature_2m)}°C`;
            document.getElementById('feelsLike').textContent = `${Math.round(current.apparent_temperature)}°C`;
            document.getElementById('humidity').textContent = `${current.relative_humidity_2m}%`;
            document.getElementById('windSpeed').textContent = `${Math.round(current.wind_speed_10m)} km/h`;
            document.getElementById('pressure').textContent = `${current.pressure_msl} mb`;
            document.getElementById('visibility').textContent = `${(current.visibility / 1000).toFixed(1)} km`;
            document.getElementById('uvIndex').textContent = 'N/A';

            document.getElementById('weatherContainer').classList.remove('hidden');
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            document.getElementById('weatherContainer').classList.add('hidden');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }

        function showLoading(show) {
            document.getElementById('loadingMessage').classList.toggle('hidden', !show);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchWeather();
            }
        }

        // Load default city on page load
        window.addEventListener('load', () => {
            document.getElementById('cityInput').value = 'Bahir Dar';
            searchWeather();
        });
    </script>

</body>
</html>
